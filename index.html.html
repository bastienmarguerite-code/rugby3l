// ── IndexedDB ─────────────────────────────────────────────────────────────────
const DB_NAME = "rugby3L", DB_VER = 1, STORE = "data";
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, {keyPath:"k"});
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbGet(k) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,"readonly");
    const req = tx.objectStore(STORE).get(k);
    req.onsuccess = () => res(req.result ? req.result.v : null);
    req.onerror = () => rej(req.error);
  });
}
function dbSet(k, v) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put({k, v});
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function loadAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,"readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => {
      const obj = {};
      (req.result||[]).forEach(r => obj[r.k] = r.v);
      res(obj);
    };
    req.onerror = () => rej(req.error);
  });
}

let DATA = {};

function fmtRest(s){if(!s)return"";return s>=60?Math.floor(s/60)+"min"+(s%60?s%60+"s":""):s+"s";}

function weekProg(wk){
  let t=0,d=0;
  DAY_ORDER.forEach(dk=>{const day=WEEKS[wk]?.days[dk];if(!day||day.type==="repos")return;t++;if(DATA[wk+"_"+dk+"_done"])d++;});
  return{t,d};
}
function globalPct(){
  let t=0,d=0;
  WEEK_ORDER.forEach(wk=>DAY_ORDER.forEach(dk=>{const day=WEEKS[wk]?.days[dk];if(!day||day.type==="repos")return;t++;if(DATA[wk+"_"+dk+"_done"])d++;}));
  return t>0?Math.round(d/t*100):0;
}

// ── PERSIST ───────────────────────────────────────────────────────────────────
async function persist(k, v) {
  DATA[k] = v;
  await dbSet(k, v);
  render();
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer(secs){
  clearInterval(TIMER_IVAL);
  TIMER={total:secs,rem:secs,running:true};
  TIMER_IVAL=setInterval(()=>{
    if(!TIMER||!TIMER.running)return;
    TIMER.rem--;
    if(TIMER.rem<=0){TIMER.rem=0;TIMER.running=false;}
    renderTimerOverlay();
  },1000);
  render();
}
function stopTimer(){clearInterval(TIMER_IVAL);TIMER=null;render();}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class")e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return e;
}
const S = (css) => ({style:css}); // shorthand

// ── RENDER TIMER OVERLAY ──────────────────────────────────────────────────────
function renderTimerOverlay(){
  const ov = document.getElementById("timer-ov");
  if(!TIMER){ov.innerHTML="";ov.style.display="none";return;}
  ov.style.display="flex";
  const{total,rem,running}=TIMER;
  const pct=(total-rem)/total;
  const done=rem===0;
  const R=54,circ=2*Math.PI*R;
  const mins=Math.floor(rem/60),secs=rem%60;
  const timeStr=mins>0?mins+":"+(secs<10?"0":""+secs):String(rem);

  ov.innerHTML=`
  <div style="background:#111827;border-radius:24px;padding:32px 28px;width:280px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.6)">
    <div style="font-size:12px;font-weight:700;color:#4b5563;letter-spacing:0.1em;margin-bottom:20px">TEMPS DE REPOS</div>
    <div style="position:relative;display:inline-block;margin-bottom:18px">
      <svg width="128" height="128" style="transform:rotate(-90deg)">
        <circle cx="64" cy="64" r="${R}" fill="none" stroke="#1f2937" stroke-width="10"/>
        <circle cx="64" cy="64" r="${R}" fill="none" stroke="${done?"#16a34a":"#f59e0b"}" stroke-width="10"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}" stroke-linecap="round"
          style="transition:stroke-dashoffset 0.9s linear"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        ${done?'<span style="font-size:32px">✅</span>':`<span style="font-size:36px;font-weight:900;color:#fff;line-height:1">${timeStr}</span><span style="font-size:11px;color:#6b7280">${mins>0?"min":"sec"}</span>`}
      </div>
    </div>
    ${done?'<div style="font-size:15px;font-weight:700;color:#16a34a;margin-bottom:14px">C\'est parti ! 💪</div>':""}
    <div style="display:flex;gap:8px;justify-content:center">
      ${!done?`<button id="tp" style="background:#1f2937;border:1px solid #374151;color:#e5e7eb;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600">${running?"⏸":"▶"}</button>`:""}
      <button id="tc" style="background:${done?"#16a34a":"#374151"};border:none;color:#fff;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600">${done?"Fermer":"Passer"}</button>
    </div>
    <button id="tr" style="margin-top:10px;background:none;border:none;color:#4b5563;font-size:11px">↺ Reset</button>
  </div>`;
  const tp=ov.querySelector("#tp"),tc=ov.querySelector("#tc"),tr=ov.querySelector("#tr");
  if(tp)tp.onclick=()=>{TIMER.running=!TIMER.running;renderTimerOverlay();};
  tc.onclick=stopTimer;
  tr.onclick=()=>{TIMER.rem=TIMER.total;TIMER.running=true;renderTimerOverlay();};
}

// ── BUILD WEIGHT TRACKER ──────────────────────────────────────────────────────
function buildWeightTracker(){
  const weights=WEIGHT_WEEKS.map(w=>parseFloat(DATA["weight_"+w.wk])||null);
  const valid=weights.filter(Boolean);
  const minW=valid.length?Math.min(...valid)-1.5:83;
  const maxW=valid.length?Math.max(...valid)+1.5:88;
  const range=maxW-minW||1;
  const latest=[...valid].pop(),first=valid[0];
  const diff=latest&&first?(latest-first).toFixed(1):null;

  const sec=el("div",{style:{margin:"16px 12px 0",background:"#111827",borderRadius:"14px",padding:"14px",border:"1px solid #1f2937"}});
  sec.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}},
    el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#f59e0b",letterSpacing:"0.08em"}},"⚖️ POIDS — lundi matin à jeun"),
    diff!==null?el("div",{style:{fontSize:"12px",fontWeight:"700",color:parseFloat(diff)>0?"#ef4444":"#4ade80"}},(parseFloat(diff)>0?"+":"")+diff+" kg"):null
  ));

  // Chart
  const chart=el("div",{style:{height:"56px",display:"flex",alignItems:"flex-end",gap:"3px",marginBottom:"6px"}});
  WEIGHT_WEEKS.forEach((w,i)=>{
    const val=weights[i];
    const h=val?Math.max(6,Math.round(((val-minW)/range)*44)):3;
    const col=el("div",{style:{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"1px"}});
    if(val) col.appendChild(el("div",{style:{fontSize:"5.5px",color:"#4ade80",fontWeight:"700",whiteSpace:"nowrap"}},val));
    col.appendChild(el("div",{style:{width:"100%",height:h+"px",borderRadius:"2px 2px 0 0",background:val?"#16a34a":"#1f2937",marginTop:"auto"}}));
    chart.appendChild(col);
  });
  sec.appendChild(chart);

  // Inputs
  const grid=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px"}});
  WEIGHT_WEEKS.forEach(w=>{
    const val=DATA["weight_"+w.wk]||"";
    const cell=el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}});
    cell.appendChild(el("div",{style:{fontSize:"9px",color:"#6b7280",fontWeight:"600"}},w.wk));
    const inp=document.createElement("input");
    inp.type="number";inp.step="0.1";inp.min="70";inp.max="100";inp.placeholder="–";
    inp.value=val;
    inp.style.cssText="width:100%;background:#1f2937;border:1px solid "+(val?"#16a34a":"#374151")+";border-radius:6px;color:#f3f4f6;font-size:11px;font-weight:700;text-align:center;padding:4px 1px";
    inp.addEventListener("change",async()=>{
      const v=parseFloat(inp.value);
      if(v&&v>60&&v<150){await persist("weight_"+w.wk,v);inp.style.borderColor="#16a34a";}
      else{await persist("weight_"+w.wk,undefined);inp.style.borderColor="#374151";}
    });
    cell.appendChild(inp);grid.appendChild(cell);
  });
  sec.appendChild(grid);
  return sec;
}

        allDone?el("span",null,"✅"):started?el("span",{style:{color:"#f59e0b",fontSize:"12px"}},"●"):null
      ));
      card.appendChild(el("div",{style:{fontSize:"11px",color:"#4b5563",marginTop:"2px"}},WEEKS[wk]?.dates));
      if(wVal) card.appendChild(el("div",{style:{fontSize:"11px",color:"#f59e0b",marginTop:"4px",fontWeight:"700"}},"⚖️ "+wVal+" kg"));
      if(t>0){
        const bar=el("div",{style:{marginTop:"8px",height:"3px",background:"#1f2937",borderRadius:"99px"}});
        bar.appendChild(el("div",{style:{width:(d/t*100)+"%",height:"100%",background:allDone?"#16a34a":"#374151",borderRadius:"99px"}}));
        card.appendChild(bar);
        card.appendChild(el("div",{style:{fontSize:"11px",color:"#374151",marginTop:"3px"}},d+"/"+t));
      }
      grid.appendChild(card);
    });
    sec.appendChild(grid);content.appendChild(sec);
  });
  wrap.appendChild(content);
  root.appendChild(wrap);
}

// ── RENDER WEEK ───────────────────────────────────────────────────────────────
function renderWeek(){
  const wk=CUR_WEEK,week=WEEKS[wk];
  const phase=PHASES.find(p=>p.id===week.phase);
  const{t,d}=weekProg(wk);
  const root=document.getElementById("root");
  root.innerHTML="";

  const wrap=el("div",{style:{minHeight:"100vh",background:"#0d1117",paddingBottom:"40px"}});
  const hero=el("div",{style:{background:"linear-gradient(135deg,#14532d,#166534)",padding:"16px 16px 20px",color:"#fff"}});
  const back=el("button",{style:{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",borderRadius:"8px",padding:"7px 14px",fontSize:"13px",marginBottom:"14px",display:"block"},
    onClick:()=>{VIEW="home";render();}},"← Retour");
  hero.appendChild(back);
  hero.appendChild(el("div",{style:{fontSize:"22px",fontWeight:"900"}},week.label+" – "+week.dates));
  if(phase) hero.appendChild(el("div",{style:{marginTop:"6px",fontSize:"12px",background:"rgba(0,0,0,0.2)",display:"inline-block",padding:"3px 10px",borderRadius:"99px"}},phase.label));
  const pb=el("div",{style:{marginTop:"14px",display:"flex",alignItems:"center",gap:"10px"}});
  const bar=el("div",{style:{flex:"1",height:"5px",background:"rgba(255,255,255,0.15)",borderRadius:"99px"}});
  bar.appendChild(el("div",{style:{width:(t>0?d/t*100:0)+"%",height:"100%",background:"#4ade80",borderRadius:"99px"}}));
  pb.appendChild(bar);pb.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700"}},d+"/"+t));
  hero.appendChild(pb);wrap.appendChild(hero);

  const content=el("div",{style:{padding:"14px 12px 0"}});
  DAY_ORDER.forEach(dk=>{const day=week.days[dk];if(!day)return;content.appendChild(buildDayCard(wk,dk,day));});
  wrap.appendChild(content);
  root.appendChild(wrap);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  if(VIEW==="week") renderWeek();
  else renderHome();
  renderTimerOverlay();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  // Setup overlay
  const ov=document.createElement("div");
  ov.id="timer-ov";
  ov.style.cssText="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:999;align-items:center;justify-content:center";
  document.body.appendChild(ov);

  // Show loading
  document.getElementById("root").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#4ade80;font-size:16px;font-weight:700">🏉 Chargement...</div>';

  try {
    await openDB();
    DATA = await loadAll();
  } catch(e) {
    // Fallback to memory only
    console.warn("IndexedDB unavailable, using memory only");
    DATA = {};
  }
  render();
}

init();
</script>
